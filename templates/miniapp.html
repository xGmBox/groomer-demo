<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#1f7a4d">
  <title>{{ salon_name }}</title>
  <link rel="stylesheet" href="/static/app.css">
  <!-- async: не блокує рендер; Telegram SDK потрібен лише всередині Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js" async></script>
</head>
<body>

<div id="app">
  <div class="loading">Завантаження…</div>
</div>

<script>
  /* Всі дані вшиті в HTML — жодного окремого /api/config запиту */
  window.SALON = {
    name: {{ salon_name | tojson }},
    address: {{ salon_address | tojson }},
    groomerTelegram: {{ groomer_telegram | tojson }},
    botEnabled: {{ bot_enabled | tojson }},
  };
</script>
<script src="/static/app.js"></script>

</body>
</html>
