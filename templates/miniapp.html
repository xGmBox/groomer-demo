<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#8B5E3C">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <link rel="apple-touch-icon" href="/static/img/favicon.png">
  <title>{{ salon_name }}</title>
  <link rel="stylesheet" href="/static/app.css">
  <!-- Telegram Web App JS — only used if opened inside Telegram, safe to load always -->
  <script src="https://telegram.org/js/telegram-web-app.js" async></script>
</head>
<body>

<div id="app">
  <div class="loading">Ładowanie…</div>
</div>

<script>
  window.SALON = {
    name: {{ salon_name | tojson }},
    tagline: {{ salon_tagline | tojson }},
    address: {{ salon_address | tojson }},
    phone: {{ salon_phone | tojson }},
    hours: {{ salon_hours | tojson }},
    groomerTelegram: {{ groomer_telegram | tojson }},
    botEnabled: {{ bot_enabled | tojson }},
    logoColor: "/static/img/logo_kolor.png",
    logoBlack: "/static/img/logo_black.png",
  };
</script>
<script src="/static/app.js"></script>

</body>
</html>
