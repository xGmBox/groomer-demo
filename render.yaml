services:
  - type: web
    name: groomer-demo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python demo.py
    envVars:
      - key: PORT
        value: 10000
      - key: SALON_NAME
        value: Imperial Dog Grooming & Spa
      - key: SALON_ADDRESS
        value: Zielonka, ul. Kolejowa 25
      - key: SALON_TAGLINE
        value: Grooming & Spa
      - key: SALON_PHONE
        value: "+48 519 356 900"
      - key: PYTHON_VERSION
        value: 3.11.9
